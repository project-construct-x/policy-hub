spring:
  application:
    name: policy-hub-backend
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/policyhub
    driver-class-name: org.postgresql.Driver
    username: policyhub
    password: policyhub
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    user:
      name: admin
      password: admin

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.constructx.policyhub: DEBUG
    org.springframework.security: DEBUG

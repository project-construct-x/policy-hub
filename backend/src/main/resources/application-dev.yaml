spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/policyhub
    driver-class-name: org.postgresql.Driver
    username: policyhub
    password: policyhub
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  security:
    user:
      name: admin
      password: admin

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.constructx.policyhub: DEBUG
    org.springframework.security: DEBUG

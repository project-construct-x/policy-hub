services:
  postgres:
    image: postgres:16-alpine
    container_name: policyhub-postgres
    environment:
      POSTGRES_DB: policyhub
      POSTGRES_USER: policyhub
      POSTGRES_PASSWORD: policyhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policyhub -d policyhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin — optionales UI für lokale DB-Verwaltung
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: policyhub-pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@policyhub.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:

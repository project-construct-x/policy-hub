# ---------------------------------------------------------------------------
# Policy Hub — Helm values
# ---------------------------------------------------------------------------

# Optional overrides for resource names. By default names derive from the
# release name (e.g. "policy-hub-backend").
nameOverride: ""
fullnameOverride: ""

# Pull secret(s) for the private ghcr.io images. Created out-of-band with
# kubectl (see deploy/secrets/README.md); referenced here only by name.
imagePullSecrets:
  - name: ghcr-creds

# ---------------------------------------------------------------------------
# Backend (Spring Boot)
# ---------------------------------------------------------------------------
backend:
  image:
    repository: ghcr.io/project-construct-x/policy-hub-backend
    # Tag is maintained by the CI commit-back step; "latest" is only a placeholder.
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  # Spring profile driving application-prod.yaml.
  springProfile: prod
  service:
    port: 80
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

# ---------------------------------------------------------------------------
# Frontend (Angular served by nginx)
# ---------------------------------------------------------------------------
frontend:
  image:
    repository: ghcr.io/project-construct-x/policy-hub-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 2
  service:
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# ---------------------------------------------------------------------------
# Database connection (non-secret parts). The password comes from the Secret
# referenced under `secret.name` below.
# ---------------------------------------------------------------------------
database:
  name: policyhub
  username: policyhub

# Basic-auth user for the backend (non-secret parts). Password from the Secret.
auth:
  username: admin

# Name + keys of the pre-created Secret holding the sensitive values
# (created out-of-band with kubectl — see deploy/secrets/README.md).
secret:
  name: policy-hub-secrets
  keys:
    dbPassword: db-password
    authPassword: security-user-password

# ---------------------------------------------------------------------------
# In-cluster PostgreSQL (self-contained StatefulSet, official image).
# Set enabled: false to use an external/managed database instead — then point
# `database` at it and drop the postgres templates from the sync.
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  image: postgres:16-alpine
  storage: 5Gi
  # Leave empty to use the cluster's default StorageClass.
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# ---------------------------------------------------------------------------
# Ingress (ingress-nginx + cert-manager)
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  host: policy-hub.staging.construct-x.net
  # cert-manager ClusterIssuer that signs the TLS cert. TODO: confirm the name
  # used in your staging cluster.
  clusterIssuer: letsencrypt-staging
  tls: true
  # Extra annotations merged onto the Ingress (e.g. body size, rewrite rules).
  annotations: {}

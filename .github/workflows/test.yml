name: Test

# Runs every test infrastructure in the repo:
#   - backend: JUnit 5 + Testcontainers (Gradle)
#   - frontend: Vitest unit tests
#   - frontend: Cypress E2E (against the mock backend, MirageJS)
# Triggers on PRs against main (gate before merge) and on push to main
# (mirrors build-and-publish.yml's trigger).
on:
  push:
    branches: [main]
    paths-ignore:
      - "deploy/**"
      - "**/*.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      # Testcontainers spins up its own Postgres container via the Docker
      # daemon that's preinstalled on GitHub-hosted ubuntu runners.
      - name: Run backend tests (JUnit 5 + Testcontainers)
        run: ./gradlew test

  frontend-unit-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (Vitest)
        run: npm test

  frontend-e2e-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      # Starts the dev server (mock configuration, MirageJS) itself via
      # start-server-and-test, then runs Cypress headless against it.
      - name: Run E2E tests (Cypress)
        run: npm run e2e

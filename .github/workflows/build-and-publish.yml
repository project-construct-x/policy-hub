name: Build & Publish

# Build backend + frontend images, push them to GitHub Packages (ghcr.io), then
# write the new image tags back into the Helm values so ArgoCD picks them up.
on:
  push:
    branches: [main]
    # Don't retrigger on the commit-back this workflow makes, or on docs.
    paths-ignore:
      - "deploy/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: write # commit the image-tag bump back to the repo
  packages: write # push images to ghcr.io

env:
  BACKEND_IMAGE: ghcr.io/project-construct-x/policy-hub-backend
  FRONTEND_IMAGE: ghcr.io/project-construct-x/policy-hub-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: Compute image tag (short SHA)
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:main
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/cicd/docker/Dockerfile.production
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:main
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  bump-values:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # TEMPORARY (deployment test on feature/deployment) — revert to `ref: main` before merging.
      - uses: actions/checkout@v4
        with:
          ref: feature/deployment
          # GITHUB_TOKEN can push to the same repo and (by design) will NOT
          # retrigger this workflow. If branch protection blocks it, swap in a
          # PAT / deploy key with contents:write and bypass rights.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump image tags in Helm values
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          # yq (mikefarah v4) is preinstalled on ubuntu-latest runners.
          yq -i ".backend.image.tag = \"$TAG\"" deploy/helm/policy-hub/values.yaml
          yq -i ".frontend.image.tag = \"$TAG\"" deploy/helm/policy-hub/values.yaml

      - name: Commit & push
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          if git diff --quiet -- deploy/helm/policy-hub/values.yaml; then
            echo "Image tags already up to date; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/policy-hub/values.yaml
          git commit -m "ci: bump image tags to ${TAG} [skip ci]"
          # TEMPORARY (deployment test on feature/deployment) — revert to `origin main` before merging.
          git pull --rebase --autostash origin feature/deployment
          git push

# Server block for the Angular SPA. Included into nginx's http{} block via
# /etc/nginx/conf.d/. The nginx-unprivileged base image listens on 8080 and
# runs as a non-root user.
server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Never cache the app shell so new deployments are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Content-hashed build artifacts (outputHashing: all) are immutable.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history-mode fallback: unknown routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

<section class="palette" *transloco="let t">
  <header class="palette__header">
    <h3>{{ t('policyBuilder.palette.title') }}</h3>
    <p class="palette__subtitle">{{ t('policyBuilder.palette.subtitle') }}</p>
  </header>

  <div class="palette__buttons">
    @for (opt of options(); track opt.type) {
      <button
        type="button"
        class="palette__btn"
        [class.palette__btn--active]="opt.active"
        [attr.aria-pressed]="opt.active"
        (click)="onToggle(opt.type)"
        [attr.data-cy]="'palette-' + opt.type"
      >
        <mat-icon aria-hidden="true">{{ opt.meta.icon }}</mat-icon>
        <span>{{ t(opt.meta.labelKey) }}</span>
      </button>
    }
  </div>
</section>
